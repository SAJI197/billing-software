{% extends 'base.html' %}
{% block content %}
<h2>Payment Made</h2>
<form method="post">
  <div class="row">
    <div class="col-3"><label>Voucher No</label><input name="voucher_no" value="{{ voucher_no }}"></div>
    <div class="col-3"><label>Date</label><input type="date" name="voucher_date" value="{{ today }}" required></div>
    <div class="col-6"><label>Supplier</label><select name="supplier_id" required>{% for s in suppliers %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select></div>
    <div class="col-3"><label>Amount</label><input name="amount" type="number" step="0.01" required></div>
    <div class="col-3"><label>Reference</label><input name="reference"></div>
    <div class="col-6"><label>Notes</label><textarea name="notes"></textarea></div>
  </div>
  <button class="btn" type="submit">Save Payment</button>
</form>
<table><tr><th>Voucher No</th><th>Date</th><th>Supplier</th><th>Amount</th><th>PDF</th></tr>{% for p in payments %}<tr><td>{{ p.voucher_no }}</td><td>{{ p.voucher_date.strftime('%d-%m-%Y') }}</td><td>{{ p.supplier.name }}</td><td>{{ p.amount|money }}</td><td><a class="btn btn-secondary" href="{{ url_for('payment_pdf', row_id=p.id) }}">PDF</a></td></tr>{% endfor %}</table>
{% endblock %}
