{% extends 'base.html' %}
{% block content %}
<h2>Receipt Entry</h2>
<form method="post">
  <div class="row">
    <div class="col-3"><label>Voucher No</label><input name="voucher_no" value="{{ voucher_no }}"></div>
    <div class="col-3"><label>Date</label><input type="date" name="voucher_date" value="{{ today }}" required></div>
    <div class="col-6"><label>Customer</label><select name="customer_id" required>{% for c in customers %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
    <div class="col-3"><label>Amount</label><input name="amount" type="number" step="0.01" required></div>
    <div class="col-3"><label>Reference</label><input name="reference"></div>
    <div class="col-6"><label>Notes</label><textarea name="notes"></textarea></div>
  </div>
  <button class="btn" type="submit">Save Receipt</button>
</form>
<table><tr><th>Voucher No</th><th>Date</th><th>Customer</th><th>Amount</th><th>PDF</th></tr>{% for r in receipts %}<tr><td>{{ r.voucher_no }}</td><td>{{ r.voucher_date.strftime('%d-%m-%Y') }}</td><td>{{ r.customer.name }}</td><td>{{ r.amount|money }}</td><td><a class="btn btn-secondary" href="{{ url_for('receipt_pdf', row_id=r.id) }}">PDF</a></td></tr>{% endfor %}</table>
{% endblock %}
