{% extends 'base.html' %}
{% block content %}
<h2>Create Sales Invoice</h2>
<form method="post">
  <div class="row">
    <div class="col-3"><label>Invoice No</label><input name="invoice_no" value="{{ invoice_no }}"></div>
    <div class="col-3"><label>Invoice Date</label><input type="date" name="invoice_date" value="{{ today }}" required></div>
    <div class="col-6"><label>Customer</label><select name="customer_id" required>{% for c in customers %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
  </div>
  <h3>Line Items</h3>
  <table id="items-table">
    <tr><th>Description</th><th>Qty</th><th>Rate</th><th>VAT %</th></tr>
    {% for _ in range(12) %}
    <tr>
      <td><input name="description"></td>
      <td><input name="qty" type="number" step="0.01"></td>
      <td><input name="rate" type="number" step="0.01"></td>
      <td><select name="vat_percent"><option value="5">5</option><option value="0">0</option></select></td>
    </tr>
    {% endfor %}
  </table>
  <p class="muted">For 20 or 30 items, click Add Row before saving. PDF will continue to page 2 and page 3 automatically.</p>
  <button class="btn btn-secondary no-print" type="button" onclick="addRow()">Add Row</button>
  <div class="row" style="margin-top:12px;">
    <div class="col-12"><label>Notes</label><textarea name="notes"></textarea></div>
  </div>
  <button class="btn btn-success" type="submit">Save Invoice</button>
</form>
<script>
function addRow() {
  const table = document.getElementById('items-table');
  const row = table.insertRow(-1);
  row.innerHTML = `
    <td><input name="description"></td>
    <td><input name="qty" type="number" step="0.01"></td>
    <td><input name="rate" type="number" step="0.01"></td>
    <td><select name="vat_percent"><option value="5">5</option><option value="0">0</option></select></td>`;
}
</script>
{% endblock %}
