<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Login</title>
<style>body{font-family:Arial,sans-serif;background:#e2e8f0;margin:0}.login-box{max-width:420px;margin:70px auto;background:white;padding:24px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08)}input{width:100%;padding:10px;margin:8px 0;border:1px solid #cbd5e1;border-radius:8px;box-sizing:border-box}.btn{width:100%;padding:11px;background:#1d4ed8;color:white;border:none;border-radius:8px}.small{font-size:12px;color:#475569}</style></head>
<body><div class="login-box"><h2>Transport Billing Software</h2><p class="small">Default login after first run: admin / admin123</p><form method="post"><input name="username" placeholder="Username" required><input type="password" name="password" placeholder="Password" required><button class="btn" type="submit">Login</button></form><p class="small">If this is the first deployment, open <code>/init-db</code> one time.</p></div></body></html>
