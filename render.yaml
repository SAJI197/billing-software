services:
  - type: web
    name: billing-software
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: billing-db
          property: connectionString

databases:
  - name: billing-db                     
