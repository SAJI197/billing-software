services:
  - type: web
    name: transport-billing-software
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: transport-billing-db
          property: connectionString

databases:
  - name: transport-billing-db
    databaseName: transport_billing
    user: transport_billing_user
